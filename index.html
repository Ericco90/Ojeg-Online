<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ojeg Kilat - Cek Tarif & Pesan Ojeg</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        ojeg: {
                            yellow: '#facc15',
                            dark: '#111827',
                            card: '#1f2937',
                            border: '#374151',
                            hover: '#4b5563'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #111827; color: #f9fafb; -webkit-tap-highlight-color: transparent; }
        /* Kustom scrollbar untuk dropdown */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <header class="w-full max-w-md text-center mb-8 mt-4">
        <div class="inline-flex items-center justify-center bg-ojeg-card p-4 rounded-full border border-ojeg-border shadow-lg mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="#facc15" viewBox="0 0 256 256">
                <path d="M248,104a8,8,0,0,0-8-8H209.68l-15.17-45.5A16,16,0,0,0,179.34,40H112a8,8,0,0,0,0,16h67.34l10.66,32H131.78l-11.83-35.49A16,16,0,0,0,104.78,40H40a8,8,0,0,0,0,16h64.78l10.67,32H40a8,8,0,0,0-8,8v16H16a8,8,0,0,0,0,16H32v18.06A40,40,0,1,0,48,184V128h82v56a40,40,0,1,0,16,0V128h78v18.06A40,40,0,1,0,240,184V128h8A8,8,0,0,0,248,104ZM64,184a24,24,0,1,1,24-24A24,24,0,0,1,64,184Zm128,0a24,24,0,1,1,24-24A24,24,0,0,1,192,184Z"></path>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-ojeg-yellow tracking-tight">Ojeg Bregas Kilat</h1>
        <p class="text-gray-400 mt-1 text-sm font-medium">Khusus Area Brebes,Tegal & Slawi</p>
    </header>

    <main class="w-full max-w-md bg-ojeg-card rounded-2xl shadow-2xl border border-ojeg-border p-6 mb-8 relative overflow-hidden">
        
        <div class="space-y-4 relative z-10">
            <!-- Nama -->
            <div class="relative">
                <label for="customerName" class="block text-sm font-semibold text-gray-300 mb-1.5 ml-1">Nama Pemesan</label>
                <input type="text" id="customerName" placeholder="Nama Anda..." class="w-full bg-ojeg-dark border border-ojeg-border rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-ojeg-yellow transition-all">
            </div>

            <!-- Jemput -->
            <div class="relative">
                <label for="origin" class="block text-sm font-semibold text-gray-300 mb-1.5 ml-1">Titik Jemput</label>
                <div class="relative flex items-center">
                    <div class="absolute left-4 text-green-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,64a40,40,0,1,0,40,40A40,40,0,0,0,128,64Zm0,64a24,24,0,1,1,24-24A24,24,0,0,1,128,128Zm0-112a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm0,206c-16.53-13-72-60.75-72-118a72,72,0,0,1,144,0C200,161.25,144.53,209,128,222Z"></path></svg>
                    </div>
                    <input type="text" id="origin" placeholder="Ketik nama desa/kecamatan..." autocomplete="off" class="w-full bg-ojeg-dark border border-ojeg-border rounded-xl pl-11 pr-10 py-3.5 text-white text-sm focus:outline-none focus:border-ojeg-yellow transition-all">
                    <!-- Indikator Sukses Pilih -->
                    <div id="origin-check" class="absolute right-4 text-green-500 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M173.66,98.34a8,8,0,0,1,0,11.32l-56,56a8,8,0,0,1-11.32,0l-24-24a8,8,0,0,1,11.32-11.32L112,148.69l50.34-50.35A8,8,0,0,1,173.66,98.34ZM224,128a96,96,0,1,1-96-96A96.11,96.11,0,0,1,224,128Zm-16,0a80,80,0,1,0-80,80A80.09,80.09,0,0,0,208,128Z"></path></svg>
                    </div>
                </div>
                <!-- Dropdown Saran Lokasi Jemput -->
                <div id="origin-list" class="absolute w-full bg-[#2a374a] border border-ojeg-border rounded-xl mt-1 hidden z-50 max-h-48 overflow-y-auto custom-scrollbar shadow-xl"></div>
            </div>

            <!-- Tujuan -->
            <div class="relative">
                <label for="destination" class="block text-sm font-semibold text-gray-300 mb-1.5 ml-1">Tujuan</label>
                <div class="relative flex items-center">
                    <div class="absolute left-4 text-red-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,16a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm0,206c-16.53-13-72-60.75-72-118a72,72,0,0,1,144,0C200,161.25,144.53,209,128,222Zm40-118a40,40,0,1,1-40-40A40,40,0,0,1,168,104Zm-16,0a24,24,0,1,0-24,24A24,24,0,0,0,152,104Z"></path></svg>
                    </div>
                    <input type="text" id="destination" placeholder="Ketik nama desa/kecamatan..." autocomplete="off" class="w-full bg-ojeg-dark border border-ojeg-border rounded-xl pl-11 pr-10 py-3.5 text-white text-sm focus:outline-none focus:border-ojeg-yellow transition-all">
                    <!-- Indikator Sukses Pilih -->
                    <div id="dest-check" class="absolute right-4 text-green-500 hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M173.66,98.34a8,8,0,0,1,0,11.32l-56,56a8,8,0,0,1-11.32,0l-24-24a8,8,0,0,1,11.32-11.32L112,148.69l50.34-50.35A8,8,0,0,1,173.66,98.34ZM224,128a96,96,0,1,1-96-96A96.11,96.11,0,0,1,224,128Zm-16,0a80,80,0,1,0-80,80A80.09,80.09,0,0,0,208,128Z"></path></svg>
                    </div>
                </div>
                <!-- Dropdown Saran Lokasi Tujuan -->
                <div id="destination-list" class="absolute w-full bg-[#2a374a] border border-ojeg-border rounded-xl mt-1 hidden z-50 max-h-48 overflow-y-auto custom-scrollbar shadow-xl"></div>
                
                <p class="text-[10px] text-gray-400 mt-1.5">*Wajib pilih alamat dari saran (dropdown) yang muncul.</p>
            </div>
        </div>

        <!-- Notifikasi Error -->
        <div id="error-message" class="hidden mt-4 text-red-400 text-sm font-medium text-center bg-red-900/20 p-3 rounded-lg border border-red-800/50 relative z-10">
            Pesan Error Disini
        </div>

        <!-- Tombol Hitung (Ditambahkan Kembali) -->
        <button id="btn-calculate" onclick="checkAndCalculate()" class="w-full mt-6 bg-ojeg-yellow hover:bg-yellow-400 text-ojeg-dark font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(250,204,21,0.2)] transition-all transform active:scale-[0.98] flex justify-center items-center gap-2 text-base relative z-10">
            <span>Cek Tarif Sekarang</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="M221.66,133.66l-72,72a8,8,0,0,1-11.32-11.32L196.69,136H40a8,8,0,0,1,0-16H196.69L138.34,61.66a8,8,0,0,1,11.32-11.32l72,72A8,8,0,0,1,221.66,133.66Z"></path></svg>
        </button>

        <!-- Loading -->
        <div id="loading" class="hidden mt-6 text-center text-ojeg-yellow relative z-10">
            <svg class="animate-spin h-8 w-8 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="mt-2 text-sm font-medium" id="loading-text">Menghitung jarak & tarif...</p>
        </div>

        <!-- Hasil Perhitungan -->
        <div id="result-section" class="hidden mt-6 relative z-10">
            <div class="bg-ojeg-dark rounded-xl p-4 border border-ojeg-border mb-5">
                <div class="flex justify-between items-center mb-3 pb-3 border-b border-ojeg-border/50">
                    <div>
                        <p class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Jarak Tempuh</p>
                        <p id="distance-display" class="text-xl font-bold text-white">0.00 KM</p>
                    </div>
                    <div class="text-right">
                        <p class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Total Biaya</p>
                        <p id="price-display" class="text-2xl font-bold text-ojeg-yellow">Rp 0</p>
                    </div>
                </div>
                <div class="flex justify-between text-xs text-gray-500">
                    <span>Min. order Rp 10.000</span>
                    <span>Tarif Rp 2.500/KM</span>
                </div>
            </div>
            
            <button onclick="orderWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#20bd5a] text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(37,211,102,0.2)] transition-all flex justify-center items-center gap-2 mb-3 text-base">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 256 256"><path d="M187.58,144.84l-32-16a8,8,0,0,0-8,.5l-14.69,9.8a40.55,40.55,0,0,1-16-16l9.8-14.69a8,8,0,0,0,.5-8l-16-32A8,8,0,0,0,104,64a40,40,0,0,0-40,40,88.1,88.1,0,0,0,88,88,40,40,0,0,0,40-40A8,8,0,0,0,187.58,144.84ZM152,176a72.08,72.08,0,0,1-72-72A24,24,0,0,1,99.29,80.46l11.48,23-10.15,15.23a8,8,0,0,0-.8,8.18,56.6,56.6,0,0,0,33.64,33.64,8,8,0,0,0,8.18-.8l15.23-10.15,23,11.48A24,24,0,0,1,152,176ZM128,24A104,104,0,0,0,36.18,176.88L24.83,210.93a16,16,0,0,0,20.24,20.24l34.05-11.35A104,104,0,1,0,128,24Zm0,192a87.87,87.87,0,0,1-44.06-11.81,8,8,0,0,0-6.54-.67L44,214.61l11.09-33.27a8,8,0,0,0-.67-6.54A88,88,0,1,1,128,216Z"></path></svg>
                Pesan via WhatsApp
            </button>
            <button onclick="resetForm()" class="w-full bg-transparent border-2 border-ojeg-border hover:bg-ojeg-dark text-gray-300 font-semibold py-3 rounded-xl transition-all">
                Reset Ulang
            </button>
        </div>
    </main>

    <!-- LOGIC 100% BEBAS GOOGLE API KEY -->
    <script>
        const TARIF_PER_KM = 2500;
        const MINIMUM_ORDER = 10000;
        const NOMOR_WHATSAPP = "6285641612901"; 
        
        // URL Backend Apps Script (Google Sheets Anda)
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysE4hEZwB3lvtu9gCivhvUfGpRhb4inGM8uAdQona-J6t2K1Q7-zu_0xM1fLFU0J0q4w/exec"; 

        // State Koordinat
        let coordsOrigin = null;
        let coordsDest = null;
        let finalDistanceText = "";
        let finalPriceText = "";
        let finalOriginName = "";
        let finalDestName = "";

        // Fungsi Setup Pencarian Alamat Otomatis
        function setupAutocomplete(inputId, listId, isOrigin) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);
            const checkIcon = document.getElementById(isOrigin ? 'origin-check' : 'dest-check');
            let timeoutId;

            document.addEventListener('click', (e) => {
                if (e.target !== input && e.target !== list) {
                    list.classList.add('hidden');
                }
            });

            input.addEventListener('input', () => {
                clearTimeout(timeoutId);
                const query = input.value;
                
                checkIcon.classList.add('hidden');
                if(isOrigin) coordsOrigin = null; else coordsDest = null;
                
                if (query.length < 3) { 
                    list.innerHTML = ''; 
                    list.classList.add('hidden'); 
                    return; 
                }

                timeoutId = setTimeout(async () => {
                    list.innerHTML = '<div class="p-3 text-xs text-gray-400">Mencari desa/lokasi...</div>';
                    list.classList.remove('hidden');

                    try {
                        const viewbox = "108.55,-6.70,109.35,-7.40"; 
                        const apiUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&countrycodes=id&viewbox=${viewbox}&bounded=1&limit=10`;

                        const res = await fetch(apiUrl);
                        const data = await res.json();
                        
                        list.innerHTML = '';
                        let hasValidArea = false;

                        if (data.length > 0) {
                            data.forEach(item => {
                                const alamat = item.display_name;
                                const alamatKecil = alamat.toLowerCase();
                                
                                if (alamatKecil.includes('brebes') || alamatKecil.includes('tegal')) {
                                    hasValidArea = true;
                                    const div = document.createElement('div');
                                    div.className = "p-3 border-b border-ojeg-border hover:bg-ojeg-hover cursor-pointer text-sm text-gray-200 transition-colors";
                                    
                                    const alamatPendek = alamat.split(',').slice(0, 4).join(',');
                                    div.innerText = alamatPendek;
                                    
                                    div.onclick = () => {
                                        input.value = alamatPendek;
                                        if (isOrigin) {
                                            coordsOrigin = { lat: parseFloat(item.lat), lon: parseFloat(item.lon) };
                                            finalOriginName = alamatPendek;
                                        } else {
                                            coordsDest = { lat: parseFloat(item.lat), lon: parseFloat(item.lon) };
                                            finalDestName = alamatPendek;
                                        }
                                        list.classList.add('hidden');
                                        checkIcon.classList.remove('hidden'); 
                                    };
                                    list.appendChild(div);
                                }
                            });
                        }

                        if (!hasValidArea) {
                            list.innerHTML = '<div class="p-3 text-xs text-red-400 text-center font-medium">Lokasi tidak ditemukan. Pastikan mengetik nama desa/kecamatan di Tegal/Brebes.</div>';
                        }
                    } catch (error) {
                        list.innerHTML = '<div class="p-3 text-xs text-red-400">Gagal mencari lokasi. Cek internet Anda.</div>';
                    }
                }, 800);
            });
        }

        setupAutocomplete('origin', 'origin-list', true);
        setupAutocomplete('destination', 'destination-list', false);

        // Rumus Haversine (Sistem Cadangan Jika API Rute Sibuk)
        function calculateStraightDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Radius bumi dalam meter
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(dp/2) * Math.sin(dp/2) +
                      Math.cos(p1) * Math.cos(p2) *
                      Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            const distance = R * c; 
            return distance * 1.35; // Dikali 1.35 untuk estimasi belokan jalan raya sesungguhnya
        }

        // Jalankan perhitungan KETIKA TOMBOL DIKLIK
        async function checkAndCalculate() {
            hideError();
            hideResult();

            if (!coordsOrigin) {
                showError("Mohon ketik lalu PILIH Titik Jemput dari daftar saran yang muncul.");
                return;
            }
            if (!coordsDest) {
                showError("Mohon ketik lalu PILIH Tujuan dari daftar saran yang muncul.");
                return;
            }

            showLoading(true);
            let distanceMeters = 0;
            
            try {
                // Menggunakan endpoint routing OSM resmi yang lebih stabil
                const url = `https://routing.openstreetmap.de/routed-car/route/v1/driving/${coordsOrigin.lon},${coordsOrigin.lat};${coordsDest.lon},${coordsDest.lat}?overview=false`;
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.code === 'Ok' && data.routes.length > 0) {
                    distanceMeters = data.routes[0].distance;
                } else {
                    throw new Error("Rute tidak valid");
                }
            } catch (error) {
                // FALLBACK: JIKA SERVER OSM SIBUK/DOWN, GUNAKAN RUMUS MATEMATIKA KOORDINAT
                console.warn("Server Rute Sibuk. Menggunakan rumus kalkulasi jarak matematis.", error);
                document.getElementById('loading-text').innerText = "Server sibuk. Menggunakan rute alternatif...";
                
                distanceMeters = calculateStraightDistance(
                    coordsOrigin.lat, coordsOrigin.lon,
                    coordsDest.lat, coordsDest.lon
                );
            }

            // Memproses Jarak & Harga Akhir
            setTimeout(() => {
                showLoading(false);
                document.getElementById('loading-text').innerText = "Menghitung jarak & tarif..."; // kembalikan text

                if (distanceMeters > 0) {
                    const distanceKm = (distanceMeters / 1000).toFixed(2);
                    
                    let price = Math.round(distanceKm * TARIF_PER_KM);
                    if (price < MINIMUM_ORDER) price = MINIMUM_ORDER;

                    finalDistanceText = distanceKm;
                    finalPriceText = price;
                    
                    document.getElementById('distance-display').innerText = `${distanceKm} KM`;
                    document.getElementById('price-display').innerText = formatRupiah(price);
                    
                    document.getElementById('btn-calculate').classList.add('hidden');
                    showResult();
                } else {
                    showError("Gagal menghitung jarak. Coba atur ulang titik lokasi Anda.");
                }
            }, 500); // Sedikit jeda agar transisi lebih mulus
        }

        // Proses Pesan WhatsApp
        function orderWhatsApp() {
            const customerName = document.getElementById('customerName').value || "Pelanggan";
            const hargaRupiah = formatRupiah(finalPriceText);
            
            if (!finalDistanceText) {
                showError("Hitung harga terlebih dahulu sebelum memesan.");
                return;
            }

            const orderId = "OJK-" + Date.now().toString().slice(-6);
            const waktuOrder = new Date().toLocaleString('id-ID');
            
            const textMessage = `Halo Ojeg Kilat.\n\n*DETAIL ORDER:*\n🆔 *ID:* ${orderId}\n👤 *Nama:* ${customerName}\n📍 *Jemput:* ${finalOriginName}\n🏁 *Tujuan:* ${finalDestName}\n📏 *Jarak:* ${finalDistanceText} KM\n💰 *Tarif:* ${hargaRupiah}\n\nMohon konfirmasi.`;
            
            saveToGoogleSheets(orderId, waktuOrder, customerName, finalOriginName, finalDestName, finalDistanceText, finalPriceText);
            
            window.open(`https://wa.me/${NOMOR_WHATSAPP}?text=${encodeURIComponent(textMessage)}`, '_blank');
        }

        // Simpan Data Order ke Google Sheets
        function saveToGoogleSheets(orderId, waktu, nama, origin, destination, distance, price) {
            if (GOOGLE_SCRIPT_URL.includes("YOUR_GOOGLE_APPS_SCRIPT")) return; 
            const data = new FormData();
            data.append('orderId', orderId); 
            data.append('waktu', waktu); 
            data.append('nama', nama);
            data.append('jemput', origin); 
            data.append('tujuan', destination); 
            data.append('jarak', distance); 
            data.append('harga', price);

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: data, mode: 'no-cors' })
                .catch(e => console.error(e));
        }

        // Utilitas
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }
        function showLoading(show) { 
            const btn = document.getElementById('btn-calculate');
            const loader = document.getElementById('loading');
            if(show) {
                btn.classList.add('hidden');
                loader.classList.remove('hidden');
            } else {
                btn.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }
        function showResult() { document.getElementById('result-section').classList.remove('hidden'); }
        function hideResult() { document.getElementById('result-section').classList.add('hidden'); }
        function showError(msg) { 
            const el = document.getElementById('error-message'); 
            el.innerText = msg; el.classList.remove('hidden'); 
        }
        function hideError() { document.getElementById('error-message').classList.add('hidden'); }
        
        function resetForm() {
            document.getElementById('customerName').value = '';
            document.getElementById('origin').value = '';
            document.getElementById('destination').value = '';
            document.getElementById('origin-check').classList.add('hidden');
            document.getElementById('dest-check').classList.add('hidden');
            document.getElementById('btn-calculate').classList.remove('hidden');
            coordsOrigin = null;
            coordsDest = null;
            hideResult();
            hideError();
        }
    </script>
</body>
</html>
